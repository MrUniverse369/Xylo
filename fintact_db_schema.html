							<head><style>
#erd { padding: 1rem 0; }
#erd svg { width: 100%; height: auto; }
</style>
</head><body><div id="erd"></div>
<script type="module">
import mermaid from 'https://esm.sh/mermaid@11/dist/mermaid.esm.min.mjs';
const dark = matchMedia('(prefers-color-scheme: dark)').matches;
await document.fonts.ready;
mermaid.initialize({
  startOnLoad: false,
  theme: 'base',
  fontFamily: '"Anthropic Sans", sans-serif',
  themeVariables: {
    darkMode: dark,
    fontSize: '13px',
    fontFamily: '"Anthropic Sans", sans-serif',
    lineColor: dark ? '#9c9a92' : '#73726c',
    textColor: dark ? '#c2c0b6' : '#3d3d3a',
    primaryColor: dark ? '#2a2a28' : '#f1efe8',
    primaryBorderColor: dark ? '#444441' : '#b4b2a9',
    attributeBackgroundColorEven: dark ? '#232320' : '#f8f7f4',
    attributeBackgroundColorOdd: dark ? '#2c2c2a' : '#ffffff',
  },
});

const diagram = `erDiagram
  customers {
    int id PK
    varchar email
    varchar password
    varchar first_name
    varchar last_name
    varchar company_name
    varchar phone
    varchar status
    timestamp created_at
    timestamp updated_at
  }
  addresses {
    int id PK
    int customer_id FK
    varchar type
    varchar line_1
    varchar line_2
    varchar city
    varchar postcode
    char country
    boolean is_default
    timestamp created_at
  }
  plans {
    int id PK
    varchar name
    numeric price_monthly
    numeric price_annually
    int max_terminals
    int max_users
    jsonb features
    boolean is_active
    timestamp created_at
  }
  customer_subscriptions {
    int id PK
    int customer_id FK
    int plan_id FK
    varchar billing_cycle
    varchar status
    date start_date
    date end_date
    timestamp cancelled_at
    timestamp created_at
  }
  products {
    int id PK
    varchar sku
    varchar name
    text description
    varchar category
    numeric price
    int stock_qty
    boolean is_active
    timestamp created_at
  }
  orders {
    int id PK
    int customer_id FK
    varchar status
    numeric subtotal
    numeric tax
    numeric total
    text notes
    timestamp created_at
    timestamp updated_at
  }
  order_items {
    int id PK
    int order_id FK
    int product_id FK
    int quantity
    numeric unit_price
    numeric line_total
  }
  payments {
    int id PK
    int customer_id FK
    int order_id FK
    int subscription_id FK
    numeric amount
    char currency
    varchar method
    varchar status
    varchar provider_ref
    timestamp paid_at
    timestamp created_at
  }
  support_tickets {
    int id PK
    int customer_id FK
    varchar subject
    text body
    varchar status
    varchar priority
    timestamp created_at
    timestamp updated_at
  }

  customers ||--o{ addresses : "has"
  customers ||--o{ customer_subscriptions : "subscribes"
  customers ||--o{ orders : "places"
  customers ||--o{ payments : "makes"
  customers ||--o{ support_tickets : "raises"
  plans ||--o{ customer_subscriptions : "used in"
  orders ||--o{ order_items : "contains"
  products ||--o{ order_items : "appears in"
  orders ||--o{ payments : "paid via"
  customer_subscriptions ||--o{ payments : "billed via"
`;

const { svg } = await mermaid.render('erd-svg', diagram);
document.getElementById('erd').innerHTML = svg;

document.querySelectorAll('#erd svg .node').forEach(node => {
  const firstPath = node.querySelector('path[d]');
  if (!firstPath) return;
  const d = firstPath.getAttribute('d');
  const nums = d.match(/-?[\d.]+/g)?.map(Number);
  if (!nums || nums.length < 8) return;
  const xs = [nums[0], nums[2], nums[4], nums[6]];
  const ys = [nums[1], nums[3], nums[5], nums[7]];
  const x = Math.min(...xs), y = Math.min(...ys);
  const w = Math.max(...xs) - x, h = Math.max(...ys) - y;
  const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
  rect.setAttribute('x', x); rect.setAttribute('y', y);
  rect.setAttribute('width', w); rect.setAttribute('height', h);
  rect.setAttribute('rx', '8');
  for (const a of ['fill', 'stroke', 'stroke-width', 'class', 'style']) {
    if (firstPath.hasAttribute(a)) rect.setAttribute(a, firstPath.getAttribute(a));
  }
  firstPath.replaceWith(rect);
});

document.querySelectorAll('#erd svg .row-rect-odd path, #erd svg .row-rect-even path').forEach(p => {
  p.setAttribute('stroke', 'none');
});
</script>
</body></html>
